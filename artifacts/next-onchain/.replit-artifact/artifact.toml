kind = "web"
previewPath = "/"
title = "OnchainKit App"
version = "1.0.0"
id = "artifacts/next-onchain"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/next-onchain run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/next-onchain", "run", "build" ]
publicDir = "artifacts/next-onchain/.next"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
